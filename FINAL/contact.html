        <div class="content-body purple tab5">
            <h2>Contact</h2>
            <div id="contact-list">
                <div class="icon">
                    <a href="https://www.linkedin.com/in/mandy-wang-514859249" target="_blank" class="fa fa-linkedin"></a>
                    <div class="icon-mask"><span>LinkedIn</span></div>
                </div>
                <div class="icon">
                    <a href="https://github.com/MdyWg" target="_blank" class="fa fa-github"></a>

                </div>
                <div class="icon">
                    <i class="fa fa-google"></i>

                            <span>Gmail</span>
                            <p class="copy" data-email="mdywg16@gmail.com">Personal: mdywg16@gmail.com</p>

                        </div>

            <div class="form">
                <form action="https://formspree.io/f/xzdjnndz" method="POST">
                    <div class="row">
                        <label for="name" class="label-lg">Name: </label>
                        <input type="text" name="name" class="input-lg" required/>

                        <label for="email" class="label-lg">Email: </label>
                        <input type="text" name="email" class="input-lg" required/>
                    </div>
                    <div class="message-area">
                        <label for="message">Enter Message:</label>
                        <textarea name="message" class="message" placeholder="Enter a message here" required></textarea>
                    </div>
                    <div class="button-bar">
                        <button class="btn-dark purple" type="submit">Send</button>
                    </div>
                    <input type="hidden" name="subject" value="New submission from {{name}}" />
                </form>
            </div>
        </div>
