<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flexbox Layouts</title>
    <!-- https://fonts.google.com/icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <h2>Flex Container and Item Default Layout </h2>
    <div class = "container">
      <div class = "item">1</div>
      <div class = "item">2</div>
      <div class = "item">3</div>
      <div class = "item">4</div>
    </div>
    <h2>Justify Start, Align Start</h2>
    <div class = "container justify-start align-start">
      <div class = "item">1</div>
      <div class = "item">2</div>
      <div class = "item">3</div>
      <div class = "item">4</div>
    </div>
    <h2>Justify End, Align End</h2>
    <div class = "container justify-end align-end">
      <div class = "item">1</div>
      <div class = "item">2</div>
      <div class = "item">3</div>
      <div class = "item">4</div>
    </div>
    <h2>Justify Around, Align Center</h2>
    <div class = "container justify-center align center">
      <div class = "item">1</div>
      <div class = "item">2</div>
      <div class = "item">3</div>
      <div class = "item">4</div>
    </div>     
    <h2>Justify Between, Align Stretch </h2>
    <div class = "container justify-between align-stretch">
      <div class = "item">1</div>
      <div class = "item">2</div>
      <div class = "item">3</div>
      <div class = "item">4</div>
    </div>
    <h2>Justify Between, Align Stretch </h2>
    <div class = "container justify-between align-stretch">
      <div class = "item">1</div>
      <div class = "item">2</div>
      <div class = "item">3</div>
      <div class = "item">4</div>
    </div>
  </body>
</html>
